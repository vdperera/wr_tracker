---
name: Python Linting
on:
  pull_request:
    paths:
      - src/**
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.9.6
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run Mypy
        run: uv run mypy src
      - name: Run Pylint
        run: uv run pylint src
