name: Python Linting
on:
  pull_request:
    paths:
      - 'src/**'
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        # uv installs the version if not already present
        run: uv python install 3.9.6

      - name: Install dependencies
        # Syncs environment based on uv.lock and pyproject.toml
        run: uv sync --all-groups

      - name: Run Mypy
        run: uv run mypy src

      - name: Run Pylint
        run: uv run pylint src
